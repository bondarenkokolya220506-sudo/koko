<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
        }
        header {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 50px;
            margin: 0;
        }
        p {
            color: #aaa;
        }
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
        }
        section {
            padding: 60px 20px;
            text-align: center;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }
        .gallery div {
            height: 300px;
            background: #222;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Your Name</h1>
        <p>Model / Portfolio</p>
        <button class="btn">Contact Me</button>
    </div>
</header>

<section>
    <h2>About</h2>
    <p>Young model focused on fashion, editorial, and commercial work.</p>
</section>

<section>
    <h2>Portfolio</h2>
    <div class="gallery">
        <div></div>
        <div></div>
        <div></div>
    </div>
</section>

<section>
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
</section>

</body>
</html>
