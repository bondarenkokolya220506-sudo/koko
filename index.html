<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фермерские яйца</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }
        header {
            padding: 80px 20px;
            background: url('https://images.unsplash.com/photo-1582722872445-44dc5f7e3c8f') center/cover;
        }
        h1 {
            font-size: 50px;
            margin: 0;
        }
        .price {
            font-size: 30px;
            margin: 20px 0;
            color: #ffd700;
        }
        section {
            padding: 40px 20px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            background: #ffd700;
            color: black;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Фермерские яйца</h1>
    <p>Свежие, натуральные, прямо с хозяйства</p>
    <div class="price">5€ за 10 яиц</div>
    <button class="btn">Заказать</button>
</header>

<section>
    <h2>Почему наши яйца?</h2>
    <p>Куры на свободном выгуле, натуральное питание, без химии.</p>
</section>

<section>
    <h2>Контакты</h2>
    <p>Напишите в Telegram / WhatsApp</p>
</section>

</body>
</html>
